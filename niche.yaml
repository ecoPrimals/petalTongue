# petalTongue Niche Definition
# Follows SPRING_AS_NICHE_DEPLOYMENT_STANDARD v1.0.0
#
# This niche provides universal visualization capabilities to the ecoPrimals
# ecosystem. It can compose with any spring that produces DataBinding payloads.

niche:
  id: petaltongue-visualization
  name: "petalTongue Visualization"
  version: "1.6.6"
  description: >-
    Universal UI and visualization niche. Accepts DataBinding payloads from any
    spring and renders them through the deterministic pixel pipeline with full
    provenance tracking.
  family: petalTongue

# Capabilities this niche provides to the ecosystem
capabilities_provided:
  - visualization.render
  - visualization.render.stream
  - visualization.interact
  - visualization.interact.subscribe
  - visualization.provenance
  - interaction.subscribe
  - sensor.stream.subscribe
  - health.check
  - capability.list

# Capabilities this niche requires from the ecosystem
capabilities_required:
  # Security foundation (bearDog or equivalent)
  - domain: crypto
    operations: [encrypt, sign]
    required: true
  # Discovery (songbird or equivalent)
  - domain: discovery
    operations: [query]
    required: true

# Optional capabilities that enhance functionality
capabilities_optional:
  # GPU compute (toadStool / barraCuda)
  - domain: compute
    operations: [dispatch, status]
    description: "GPU acceleration for shader-based rendering"
  # AI interaction adaptation (SQUIRREL)
  - domain: interaction
    operations: [subscribe]
    description: "AI-driven interaction adaptation"
  # Ecosystem events (biomeOS)
  - domain: events
    operations: [stream]
    description: "Real-time ecosystem topology updates via SSE"

# Organism definitions for BYOB deployment
organisms:
  primals:
    petaltongue:
      type: "petaltongue"
      required: true
      role: "visualization"
      capabilities:
        - visualization.render
        - visualization.render.stream
        - visualization.render.grammar
        - visualization.render.dashboard
        - visualization.interact
        - visualization.interact.subscribe
        - visualization.export
        - visualization.validate
        - visualization.provenance
        - interaction.subscribe
        - sensor.stream.subscribe
        - health.check
        - capability.list
      config:
        mode: "${PETALTONGUE_MODE:-ui}"
        family_id: "${FAMILY_ID}"

    beardog:
      type: "beardog"
      required: true
      role: "security"
      capabilities:
        - crypto.encrypt
        - crypto.sign

    songbird:
      type: "songbird"
      required: true
      role: "discovery"
      capabilities:
        - discovery.query
        - ipc.register
        - ipc.resolve

    toadstool:
      type: "toadstool"
      required: false
      role: "compute"
      capabilities:
        - compute.dispatch
        - gpu.info
        - display.backend

    barracuda:
      type: "barracuda"
      required: false
      role: "math"
      capabilities:
        - barracuda.compute.dispatch
        - math.stat.kde
        - math.stat.smooth
        - math.tessellate.sphere
        - math.project.perspective

    rhizocrypt:
      type: "rhizocrypt"
      required: false
      role: "provenance"
      capabilities:
        - dag.session
        - dag.vertex.create

    sweetgrass:
      type: "sweetgrass"
      required: false
      role: "attribution"
      capabilities:
        - braid.create
        - contribution.record

    loamspine:
      type: "loamspine"
      required: false
      role: "ledger"
      capabilities:
        - spine.create
        - entry.append
        - certificate.mint

  chimeras: {}

# Interaction definitions for BYOB deployment
interactions:
  - from: "petaltongue"
    to: "beardog"
    type: "capability_call"
    config:
      capabilities: ["crypto.encrypt", "crypto.sign"]

  - from: "petaltongue"
    to: "songbird"
    type: "capability_call"
    config:
      capabilities: ["discovery.query", "ipc.register", "ipc.resolve"]

  - from: "petaltongue"
    to: "barracuda"
    type: "capability_call"
    config:
      capabilities: ["barracuda.compute.dispatch"]
      optional: true

  - from: "petaltongue"
    to: "toadstool"
    type: "capability_call"
    config:
      capabilities: ["display.backend", "compute.dispatch"]
      optional: true

  - from: "petaltongue"
    to: "rhizocrypt"
    type: "capability_call"
    config:
      capabilities: ["dag.session", "dag.vertex.create"]
      optional: true

  - from: "petaltongue"
    to: "sweetgrass"
    type: "capability_call"
    config:
      capabilities: ["braid.create", "contribution.record"]
      optional: true

  - from: "petaltongue"
    to: "loamspine"
    type: "capability_call"
    config:
      capabilities: ["spine.create", "entry.append"]
      optional: true

  # Inbound: springs push data to petalTongue
  - from: "*"
    to: "petaltongue"
    type: "capability_call"
    config:
      capabilities: ["visualization.render", "visualization.render.stream"]
      description: "Any spring can push DataBinding payloads for visualization"

# Customization options for BYOB deployment
customization:
  - id: "default_mode"
    label: "Default UI Mode"
    type: "select"
    options: ["ui", "tui", "cli", "web", "headless"]
    default: "ui"

  - id: "enable_provenance"
    label: "Enable Provenance Tracking"
    type: "boolean"
    default: true
    description: "Track visualization lineage via provenance trio"

  - id: "enable_gpu"
    label: "Enable GPU Acceleration"
    type: "boolean"
    default: false
    description: "Use barraCuda/toadStool for GPU-accelerated rendering"

  - id: "modalities"
    label: "Output Modalities"
    type: "multiselect"
    options: ["visual", "terminal", "audio", "haptic", "braille", "description"]
    default: ["visual", "terminal"]

# Deployment configuration
deployment:
  deploy_graph: "graphs/petaltongue_deploy.toml"
  coordination: sequential
  phases:
    - name: foundation
      description: "Security and discovery foundation"
      primals:
        - capability: crypto
          mode: server
        - capability: discovery
          mode: server
    - name: visualization
      description: "petalTongue visualization primal"
      primals:
        - capability: visualization
          mode: server
    - name: validation
      description: "Health and capability verification"
      operations:
        - health_check

# Runtime modes supported by this niche
modes:
  - id: ui
    description: "Full GUI mode with egui"
    default: true
  - id: tui
    description: "Terminal UI mode with ratatui"
  - id: cli
    description: "Command-line interface mode"
  - id: web
    description: "Web interface mode"
  - id: headless
    description: "Headless API mode for testing and automation"

# Spring data format compatibility
data_formats:
  # Standard spring push format
  - format: "bindings[]"
    description: "neuralSpring/healthSpring/wetSpring standard"
    supported: true
  # ludoSpring game channel format
  - format: "data/channel"
    description: "ludoSpring GameChannelType payload"
    supported: true
    adapter: SpringDataAdapter
  # ecoPrimals time-series standard
  - format: "ecoPrimals/time-series/v1"
    description: "Cross-spring time-series interchange format"
    supported: true
    adapter: SpringDataAdapter

# IPC endpoints
ipc:
  json_rpc:
    socket: "${XDG_RUNTIME_DIR}/biomeos/petaltongue.sock"
    methods:
      - visualization.render
      - visualization.render.stream
      - visualization.interact
      - visualization.interact.select
      - visualization.interact.subscribe
      - interaction.subscribe
      - interaction.poll
      - sensor.stream.subscribe
      - health.check
      - health.ping
      - capability.list
  sse:
    endpoint: "/api/v1/events/stream"
    description: "Consumes biomeOS ecosystem events"
