<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="generator" content="petalTongue">
    <title>petalTongue Dashboard</title>
    <style>
        :root {
            --bg: #0f1117; --surface: #1a1d2e; --border: #2a2d3e;
            --fg: #e0e0e8; --fg-dim: #8888a0; --accent: #7ba0d4;
            --green: #4ade80; --yellow: #fbbf24; --red: #f87171; --blue: #60a5fa;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--fg);
            min-height: 100vh; line-height: 1.5;
        }
        header {
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex; align-items: center; gap: 1rem;
        }
        header h1 { font-size: 1.1rem; font-weight: 600; }
        header .meta { margin-left: auto; font-size: 0.8rem; color: var(--fg-dim); display: flex; gap: 1rem; }
        .pill {
            display: inline-block; padding: 0.15rem 0.5rem; border-radius: 1rem;
            font-size: 0.75rem; font-weight: 600;
        }
        .pill-ok { background: rgba(74,222,128,0.15); color: var(--green); }
        .pill-warn { background: rgba(251,191,36,0.15); color: var(--yellow); }
        .pill-err { background: rgba(248,113,113,0.15); color: var(--red); }
        .pill-info { background: rgba(96,165,250,0.15); color: var(--blue); }
        main { max-width: 72rem; margin: 0 auto; padding: 1.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(20rem, 1fr)); gap: 1rem; }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 0.5rem; padding: 1rem;
        }
        .card h3 { font-size: 0.85rem; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .primal-name { font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem; }
        .primal-type { color: var(--fg-dim); font-size: 0.8rem; }
        .caps { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.5rem; }
        .cap { background: rgba(123,160,212,0.12); color: var(--accent); padding: 0.1rem 0.4rem; border-radius: 0.25rem; font-size: 0.7rem; }
        .endpoint { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--fg-dim); margin-top: 0.35rem; word-break: break-all; }
        .edge-list { font-size: 0.8rem; }
        .edge-list li { padding: 0.25rem 0; border-bottom: 1px solid var(--border); list-style: none; }
        .edge-list li:last-child { border-bottom: none; }
        .edge-arrow { color: var(--accent); }
        #status-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 0.35rem 1.5rem; font-size: 0.75rem; color: var(--fg-dim);
            display: flex; gap: 1.5rem;
        }
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--fg-dim); }
        .empty-state p { margin-top: 0.5rem; }
        section { margin-bottom: 1.5rem; }
        section > h2 { font-size: 0.95rem; margin-bottom: 0.75rem; color: var(--fg-dim); }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f8f9fa; --surface: #fff; --border: #e0e0e0;
                --fg: #1a1a2e; --fg-dim: #666680; --accent: #4a6fa5;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>petalTongue</h1>
        <span class="pill pill-info" id="version">--</span>
        <span class="pill pill-ok" id="conn-status">connecting</span>
        <div class="meta">
            <span id="primal-count">0 primals</span>
            <span id="edge-count">0 edges</span>
            <span id="last-update">--</span>
        </div>
    </header>

    <main>
        <section>
            <h2>Discovered Primals</h2>
            <div class="grid" id="primals-grid">
                <div class="empty-state">
                    <p>Waiting for topology data&hellip;</p>
                </div>
            </div>
        </section>

        <section id="edges-section" style="display:none">
            <h2>Topology Edges</h2>
            <div class="card">
                <ul class="edge-list" id="edges-list"></ul>
            </div>
        </section>
    </main>

    <div id="status-bar">
        <span id="sb-mode">mode: --</span>
        <span id="sb-backend">backend: --</span>
        <span id="sb-rust">pure rust</span>
        <span id="sb-events">events: 0</span>
    </div>

    <script>
    (function() {
        let eventCount = 0;

        fetch('/api/status')
            .then(r => r.json())
            .then(d => {
                document.getElementById('version').textContent = 'v' + (d.version || '?');
                document.getElementById('sb-mode').textContent = 'mode: ' + (d.mode || '?');
            })
            .catch(() => {});

        fetch('/api/snapshot')
            .then(r => r.json())
            .then(applySnapshot)
            .catch(() => {});

        const es = new EventSource('/api/events');
        es.onopen = function() {
            document.getElementById('conn-status').textContent = 'live';
            document.getElementById('conn-status').className = 'pill pill-ok';
        };
        es.onmessage = function(ev) {
            eventCount++;
            document.getElementById('sb-events').textContent = 'events: ' + eventCount;
            try { applySnapshot(JSON.parse(ev.data)); } catch(e) {}
        };
        es.onerror = function() {
            document.getElementById('conn-status').textContent = 'reconnecting';
            document.getElementById('conn-status').className = 'pill pill-warn';
        };

        function applySnapshot(snap) {
            if (!snap) return;
            const primals = snap.primals || [];
            const edges = snap.edges || [];
            const ts = snap.timestamp ? new Date(snap.timestamp * 1000).toLocaleTimeString() : '--';

            document.getElementById('primal-count').textContent = primals.length + ' primal' + (primals.length !== 1 ? 's' : '');
            document.getElementById('edge-count').textContent = edges.length + ' edge' + (edges.length !== 1 ? 's' : '');
            document.getElementById('last-update').textContent = ts;

            renderPrimals(primals);
            renderEdges(edges, primals);
        }

        function healthPill(h) {
            const s = (h || 'unknown').toLowerCase();
            if (s === 'healthy') return '<span class="pill pill-ok">healthy</span>';
            if (s === 'warning') return '<span class="pill pill-warn">warning</span>';
            if (s === 'critical' || s === 'error') return '<span class="pill pill-err">' + s + '</span>';
            return '<span class="pill pill-info">' + esc(s) + '</span>';
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function renderPrimals(primals) {
            const grid = document.getElementById('primals-grid');
            if (!primals.length) {
                grid.innerHTML = '<div class="empty-state"><p>No primals discovered yet. Discovery runs automatically.</p></div>';
                return;
            }
            grid.innerHTML = primals.map(function(p) {
                const caps = (p.capabilities || []).map(function(c) { return '<span class="cap">' + esc(c) + '</span>'; }).join('');
                return '<div class="card">' +
                    '<div class="primal-name">' + esc(p.name || p.id) + ' ' + healthPill(p.health) + '</div>' +
                    '<div class="primal-type">' + esc(p.primal_type || '') + '</div>' +
                    (caps ? '<div class="caps">' + caps + '</div>' : '') +
                    (p.endpoint ? '<div class="endpoint">' + esc(p.endpoint) + '</div>' : '') +
                '</div>';
            }).join('');
        }

        function renderEdges(edges, primals) {
            const sec = document.getElementById('edges-section');
            const list = document.getElementById('edges-list');
            if (!edges.length) { sec.style.display = 'none'; return; }
            sec.style.display = '';
            const nameMap = {};
            primals.forEach(function(p) { nameMap[p.id] = p.name || p.id; });
            list.innerHTML = edges.map(function(e) {
                return '<li>' + esc(nameMap[e.from] || e.from) +
                    ' <span class="edge-arrow">&rarr;</span> ' +
                    esc(nameMap[e.to] || e.to) +
                    (e.edge_type ? ' <span class="pill pill-info">' + esc(e.edge_type) + '</span>' : '') +
                    (e.label ? ' <em style="color:var(--fg-dim)">' + esc(e.label) + '</em>' : '') +
                '</li>';
            }).join('');
        }
    })();
    </script>
</body>
</html>
