[package]
name = "petal-tongue-tui"
version = "0.1.0"
edition = "2021"
description = "Rich Terminal User Interface for petalTongue - Universal Interface for biomeOS"
authors = ["ecoPrimals Team"]
license = "AGPL-3.0-only"

[dependencies]
# Core dependencies
petal-tongue-core = { path = "../petal-tongue-core" }
petal-tongue-discovery = { path = "../petal-tongue-discovery" }
petal-tongue-ipc = { path = "../petal-tongue-ipc" }

# TUI Framework
ratatui = "0.28"

# Terminal handling
crossterm = { version = "0.28", features = ["event-stream"] }

# Async runtime
tokio = { version = "1.45", features = ["full"] }
tokio-util = "0.7"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Async traits
async-trait = "0.1"

# Time
chrono = "0.4"

# Collections
dashmap = "6.1"

[dev-dependencies]
tempfile = "3.10"

[[example]]
name = "simple_demo"
path = "examples/simple_demo.rs"

