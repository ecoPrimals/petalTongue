[package]
name = "petal-tongue-ui"
description = "Desktop UI application providing real-time visualization of ecoPrimals ecosystem"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
petal-tongue-core = { path = "../petal-tongue-core" }
petal-tongue-graph = { path = "../petal-tongue-graph" }
petal-tongue-api = { path = "../petal-tongue-api" }
petal-tongue-animation = { path = "../petal-tongue-animation", features = ["egui"] }
petal-tongue-telemetry = { path = "../petal-tongue-telemetry" }
petal-tongue-discovery = { path = "../petal-tongue-discovery" }
petal-tongue-entropy = { path = "../petal-tongue-entropy" }
petal-tongue-adapters = { path = "../petal-tongue-adapters" }  # NEW: Adapter system
petal-tongue-ipc = { path = "../petal-tongue-ipc" }  # IPC with tarpc PRIMARY

# Songbird for capability-based discovery (TRUE PRIMAL integration)
songbird-universal = { path = "../../../../phase1/songbird/crates/songbird-universal" }
songbird-types = { path = "../../../../phase1/songbird/crates/songbird-types" }

# BingoCube is now a standalone tool at https://github.com/ecoPrimals/bingoCube
bingocube-core = { git = "ssh://git@github.com/ecoPrimals/bingoCube.git", tag = "v0.1.0" }
bingocube-adapters = { git = "ssh://git@github.com/ecoPrimals/bingoCube.git", tag = "v0.1.0", features = ["visual"] }

tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
base64 = { workspace = true }
anyhow = { workspace = true }  # For rendering_discovery error handling
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
chrono = { workspace = true }
eframe = { workspace = true }
egui = { workspace = true }
egui_extras = { workspace = true }  # For table widgets in process viewer
libc = "0.2"  # For framebuffer demo root check

# Pure Rust Audio (TRUE PRIMAL sovereignty - Audio Canvas!)
# EVOLVED: Direct hardware access (like WGPU for graphics!)
# NO rodio, NO cpal, NO ALSA - just raw device access!
symphonia = { version = "0.5", default-features = false, features = ["mp3", "wav"] }  # Pure Rust decoding only
winit = "0.30"  # Pure Rust windowing (for display detection)

# REMOVED: rodio (had ALSA C dependency via cpal)
# REMOVED: cpal (had alsa-sys C bindings)
# EVOLVED: AudioCanvas - direct /dev/snd access!

# External tool integrations
sysinfo = "0.30"  # System monitoring tool

# Pure Rust display system
atty = "0.2"  # Terminal detection for display prompts
crossterm = "0.27"  # Terminal input/output for sensors
term_size = "0.3"  # Terminal dimensions for screen sensor
async-trait = "0.1"  # For DisplayBackend trait
tiny-skia = "0.11"  # For egui → pixel rendering
epaint = { version = "0.29", default-features = false }  # For egui tessellation
png = "0.17"  # For pixel buffer conversion

# Pure Rust Display Backends
softbuffer = { version = "0.4", optional = true }
pixels = { version = "0.13", optional = true }
nix = { version = "0.28", optional = true, features = ["process"] } # For framebuffer
dialoguer = { version = "0.11", optional = true } # For external display prompt

# For Toadstool WASM integration
wasm-bindgen = { version = "0.2", optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }
web-sys = { version = "0.3", optional = true, features = ["Window", "Document", "Element", "HtmlCanvasElement", "CanvasRenderingContext2d"] }

[features]
default = ["external-display"]
external-display = [] # For eframe/egui native window
software-rendering = ["softbuffer", "pixels"]
framebuffer-direct = ["nix", "dialoguer"]
toadstool-wasm = ["wasm-bindgen", "wasm-bindgen-futures", "web-sys"]

[[bin]]
name = "petal-tongue"
path = "src/main.rs"

[[example]]
name = "display_demo"
path = "../../examples/display_demo.rs"

[[example]]
name = "pixel_renderer_demo"
path = "../../examples/pixel_renderer_demo.rs"

[[example]]
name = "pure_rust_gui_demo"
path = "../../examples/pure_rust_gui_demo.rs"

[[example]]
name = "awakening_pure_rust"
path = "../../examples/awakening_pure_rust.rs"
required-features = ["software-rendering"]

[[example]]
name = "framebuffer_demo"
path = "../../examples/framebuffer_demo.rs"
required-features = ["framebuffer-direct"]

# BingoCube demo moved to bingoCube/demos
# [[bin]]
# name = "bingocube-demo"
# path = "src/bingocube_main.rs"

[dev-dependencies]
petal-tongue-core = { path = "../petal-tongue-core", features = ["test-fixtures"] }
tokio = { workspace = true, features = ["test-util", "macros"] }
