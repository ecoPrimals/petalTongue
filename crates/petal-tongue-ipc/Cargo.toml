[package]
name = "petal-tongue-ipc"
description = "Inter-process communication for petalTongue instances"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
anyhow = { workspace = true }
petal-tongue-core = { path = "../petal-tongue-core" }
tokio = { workspace = true, features = ["net", "io-util", "sync", "macros", "rt"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# tarpc for high-performance primal-to-primal RPC
tarpc = { workspace = true }
tokio-util = { workspace = true }
tokio-serde = { workspace = true }
bincode = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }

