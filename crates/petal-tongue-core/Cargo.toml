[package]
name = "petal-tongue-core"
description = "Universal UI and Visualization System"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
reqwest = { workspace = true }
# Phase 1: Instance Management dependencies
uuid = { version = "1.7", features = ["v4", "serde"] }
ron = "0.8"
# etcetera = "0.8"  # REMOVED! Replaced with our own platform_dirs (zero deps!)
nix = { version = "0.27", features = ["signal"] }
# Universal Rendering System dependencies
async-trait = "0.1"
indexmap = "2.0"
# System information (Pure Rust Unix syscalls - EVOLVED from libc!)
# EVOLUTION: Migrated from libc to rustix for 100% safe Rust
rustix = { version = "0.38", features = ["process"] }

[features]
default = []

# EVOLUTION COMPLETE: Audio capability detection is now pure Rust via AudioCanvas
# NO rodio, NO cpal, NO ALSA dependencies needed!
# AudioCanvas provides direct /dev/snd access (like framebuffer for graphics)
# See: crates/petal-tongue-ui/src/audio_canvas.rs

test-fixtures = []

[build-dependencies]

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = "3.8"
