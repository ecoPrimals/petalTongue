# SPDX-License-Identifier: AGPL-3.0-only
[lints]
workspace = true

[package]
name = "petal-tongue-entropy"
version = "0.1.0"
edition.workspace = true
authors = ["PetalTongue Team"]
description = "Human entropy capture for petalTongue - multi-modal, accessible, sovereign"
license = "AGPL-3.0-only"

[dependencies]
# Core
petal-tongue-core = { path = "../petal-tongue-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tracing = "0.1"

# Async
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Streaming & Encryption
# Use workspace reqwest (rustls-tls, NO native-tls/OpenSSL!)
reqwest = { workspace = true }
aes-gcm = "0.10"  # AES-256-GCM authenticated encryption
rand = "0.8"  # For nonce generation
zeroize = { version = "1", features = ["derive"] }  # Secure memory clearing

# Statistics (minimal)
# (We'll implement Shannon entropy & variance ourselves for zero-cost)

[dev-dependencies]
tokio-test = "0.4"
approx = "0.5"  # For floating-point comparisons in tests

[features]
default = []

# EVOLUTION COMPLETE: Audio entropy capture now uses AudioCanvas (pure Rust!)
# NO cpal, NO hound, NO ALSA dependencies - direct /dev/snd access
# For entropy capture, we read raw PCM data from audio devices
# Status: Phase 3 feature (not needed for core functionality)

video = ["nokhwa"]

# Video capture (optional, Phase 3 feature)
[dependencies.nokhwa]
version = "0.10"
optional = true

