[package]
name = "petal-tongue-discovery"
version = "0.1.0"
edition.workspace = true
license = "AGPL-3.0-only"

[dependencies]
# Core dependencies
petal-tongue-core = { path = "../petal-tongue-core" }
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
thiserror = "1"
# REMOVED: libc = "0.2" - Now using petal-tongue-core::system_info (rustix-based, 100% safe!)

# HTTP client
reqwest = { workspace = true }  # Use workspace version (0.12 with rustls-tls)

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Time
chrono = "0.4"

# Logging
tracing = "0.1"

# Low-level socket for multicast (Phase 1)
socket2 = "0.5"

# LRU cache for performance optimization (Phase 2)
lru = "0.12"

# mDNS discovery (optional feature)
mdns-sd = { version = "0.11", optional = true }

# Modern async patterns (Discovery Evolution)
futures = "0.3"  # For concurrent operations
rand = "0.8"     # For jitter in retry logic

[features]
default = []
mdns = ["mdns-sd"]
legacy-http = []  # Legacy HTTP provider (prefer JSON-RPC/Unix sockets)
# Mock provider - Run tests with: cargo test --features test-fixtures
test-fixtures = ["petal-tongue-core/test-fixtures"]

[dev-dependencies]
tokio-test = "0.4"
wiremock = "0.6"
futures = "0.3"  # For join_all in concurrent tests

