[package]
name = "petal-tongue-graph"
description = "TODO: Add description"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
petal-tongue-core = { path = "../petal-tongue-core" }
petal-tongue-animation = { path = "../petal-tongue-animation" }
bingocube-core = { path = "../../bingoCube/core" }
bingocube-adapters = { path = "../../bingoCube/adapters", features = ["visual", "audio"] }
sourdough-core = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
egui = { workspace = true }
egui_extras = { workspace = true }
anyhow = { workspace = true }
# Pure Rust audio file generation
hound = { workspace = true }
# Optional native audio playback (requires ALSA)
rodio = { workspace = true, optional = true }
rand = { workspace = true, optional = true }

[features]
default = []
native-audio = ["rodio", "rand"]

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
