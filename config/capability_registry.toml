#
# Capability Registry — petalTongue
#
# Mirrors primalSpring canonical registry pattern. Lists every JSON-RPC
# method petalTongue SERVES (as the visualization primal) and CONSUMES
# (from other primals for content, discovery, orchestration).
#
# The served methods here must match the [visualization], [interaction],
# [render], and [viz] domains in primalSpring's capability_registry.toml.

# ─── Methods petalTongue SERVES ───────────────────────────────────────

[visualization]
owner = "petaltongue"
role = "server"
methods = [
    "visualization.capabilities",
    "visualization.export",
    "visualization.render",
    "visualization.render.dashboard",
    "visualization.render.grammar",
    "visualization.render.scene",
    "visualization.render.stream",
    "visualization.session.create",
    "visualization.session.list",
]

[interaction]
owner = "petaltongue"
role = "server"
methods = [
    "interaction.poll",
    "interaction.sensor_stream.poll",
    "interaction.subscribe",
]

[render]
owner = "petaltongue"
role = "server"
methods = [
    "render.dashboard",
]

[viz]
owner = "petaltongue"
role = "server"
methods = [
    "viz.dashboard",
    "viz.query",
    "viz.render",
    "viz.stream",
]

[health]
owner = "petaltongue"
role = "server"
methods = [
    "health.check",
    "health.liveness",
    "health.version",
]

[capabilities]
owner = "petaltongue"
role = "server"
methods = [
    "capability.list",
]

# ─── Methods petalTongue CONSUMES ─────────────────────────────────────

[content]
owner = "content-provider"
role = "client"
consumed_by = "web_mode::content_backend"
methods = [
    "content.get",
    "content.resolve",
]

[discovery]
owner = "discovery-service"
role = "client"
consumed_by = "primal_registration"
methods = [
    "ipc.register",
    "ipc.resolve",
]

# ─── Meta-Tier Signal Participation ───────────────────────────────────
#
# petalTongue participates in 3 meta signals:
# - meta.intent: STARTS loop (capture_intent via interaction.poll)
# - meta.render: ENDS loop (render_output via viz.render)
# - meta.observe: participates (render_state via viz.stream)

[signals.meta]
tier = "meta"
role = "participant"
signals = [
    { name = "intent", role = "entry", capability = "interaction.poll" },
    { name = "render", role = "exit", capability = "viz.render" },
    { name = "observe", role = "participant", capability = "viz.stream" },
]

# ─── Network fallbacks (registry > env > const) ───────────────────────
#
# Ports are discovery fallbacks, not authoritative endpoints.
# Runtime resolution via ipc.resolve / HTTP probing takes precedence.

[network.fallbacks]
web_port = 3000
headless_port = 8080
websocket_port = 8765
sandbox_security_port = 9000
sandbox_discovery_port = 8080
display_backend_port = 9001
tcp_fallback_port = 9900
discovery_ports = [8080, 8081, 3000, 9000, 9900]
loopback_host = "127.0.0.1"
bind_host = "0.0.0.0"
gpu_compute_endpoint = "tarpc://localhost:9001"
legacy_tmp_prefix = "/tmp"
alternative_run_dir = "/var/run/ecoPrimals"

[network.capability_ports]
visualization = 3000
interaction = 3000
discovery = 8080
compute = 9001
security = 9000

# ─── Test fixtures ────────────────────────────────────────────────────

[test_fixtures]
owner = "tests"
methods = [
    "test.method",
]

[false_positives]
owner = "none"
methods = [
    "index.html",
]
