# SPDX-License-Identifier: AGPL-3.0-only
# cargo-deny configuration for petalTongue
# Follows ecoPrimals wateringHole licensing and dependency standards

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "AGPL-3.0",
    "AGPL-3.0-only",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
copyleft = "warn"
confidence-threshold = 0.8
default = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
    # No native TLS -- pure Rust only (sovereignty)
    { name = "openssl", wrappers = [] },
    { name = "openssl-sys", wrappers = [] },
    { name = "native-tls", wrappers = [] },
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
