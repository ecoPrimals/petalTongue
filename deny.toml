# SPDX-License-Identifier: AGPL-3.0-only
# cargo-deny configuration for petalTongue
# Follows ecoPrimals wateringHole licensing and dependency standards

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    "RUSTSEC-2023-0040", # Transitive: bincode unmaintained (via tarpc)
    "RUSTSEC-2024-0387", # Transitive: opentelemetry_api merged (via tarpc)
    "RUSTSEC-2025-0040", # Transitive: users crate unmaintained (via eframe)
    "RUSTSEC-2025-0141", # Transitive: BytesMut reserve overflow (pending bytes update)
    "RUSTSEC-2026-0007", # Transitive: uzers root group listing
]

[licenses]
allow = [
    "AGPL-3.0",
    "AGPL-3.0-only",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OFL-1.1",
    "LicenseRef-UFL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = [
    # ecoBin banned: no native TLS, no C crypto
    { name = "ring", wrappers = [] },
    { name = "openssl", wrappers = [] },
    { name = "openssl-sys", wrappers = [] },
    { name = "native-tls", wrappers = [] },
    { name = "aws-lc-sys", wrappers = [] },
    { name = "zstd-sys", wrappers = [] },
    { name = "lz4-sys", wrappers = [] },
    { name = "libsqlite3-sys", wrappers = [] },
    { name = "cryptoki-sys", wrappers = [] },
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
