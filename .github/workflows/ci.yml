# SPDX-License-Identifier: AGPL-3.0-only
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings -W clippy::pedantic -W clippy::nursery

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Check coverage threshold
        run: |
          COVERAGE=$(cargo llvm-cov --workspace --summary-only 2>&1 | tail -1 | awk '{print $10}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 85" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 85% minimum"
            exit 1
          fi
          if [ "$(echo "$COVERAGE < 90" | bc -l)" -eq 1 ]; then
            echo "::warning::Coverage ${COVERAGE}% is below 90% target (current: ${COVERAGE}%)"
          fi

  file-size:
    name: File Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no file exceeds 1000 lines
        run: |
          OVER=$(find crates/ src/ -name '*.rs' -not -path '*/archive/*' -exec wc -l {} + | sort -rn | awk '$1 > 1000 && $2 != "total" {print}')
          if [ -n "$OVER" ]; then
            echo "::error::Files exceeding 1000 lines:"
            echo "$OVER"
            exit 1
          fi
          echo "All files under 1000 lines"

  license:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify SPDX headers
        run: |
          MISSING=$(find crates/ src/ -name '*.rs' -not -path '*/archive/*' -exec grep -L 'SPDX-License-Identifier' {} +)
          if [ -n "$MISSING" ]; then
            echo "::error::Files missing SPDX header:"
            echo "$MISSING"
            exit 1
          fi
          echo "All source files have SPDX headers"
