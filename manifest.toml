# SPDX-License-Identifier: AGPL-3.0-or-later
# genomeBin Manifest -- petalTongue
#
# Describes the deployment identity of petalTongue as an autonomous organism.
# Per GENOMEBIN_ARCHITECTURE_STANDARD.md from wateringHole.

[organism]
name = "petaltongue"
display_name = "petalTongue"
description = "Universal Visualization Primal for ecoPrimals"
version = "1.6.6"
license = "AGPL-3.0-or-later"
seed_fingerprint = "2a57a4aaed1a1e11cd977670d2c3c523a49b5ef38217e024aa76637b8b806255"

[organism.binary]
name = "petaltongue"
entry_point = "src/main.rs"

[organism.capabilities]
domains = ["visualization", "interaction", "sensor"]
methods = [
    "health.check",
    "health.liveness",
    "health.readiness",
    "health.get",
    "identity.get",
    "lifecycle.status",
    "capabilities.list",
    "capability.announce",
    "primal.announce",
    "btsp.capabilities",
    "auth.check",
    "auth.mode",
    "auth.peer_info",
    "visualization.render",
    "visualization.render.stream",
    "visualization.render.grammar",
    "visualization.render.dashboard",
    "visualization.render.scene",
    "visualization.validate",
    "visualization.export",
    "visualization.capabilities",
    "visualization.dismiss",
    "visualization.interact.apply",
    "visualization.interact.perspectives",
    "visualization.introspect",
    "visualization.panels",
    "visualization.showing",
    "visualization.session.list",
    "visualization.session.status",
    "visualization.render.graph",
    "visualization.texture.upload",
    "visualization.texture.attach",
    "visualization.scene.verify",
    "interaction.subscribe",
    "interaction.poll",
    "interaction.unsubscribe",
    "interaction.sensor_stream.subscribe",
    "interaction.sensor_stream.unsubscribe",
    "interaction.sensor_stream.poll",
    "audio.synthesize",
    "ui.render",
    "ui.display_status",
    "motor.set_panel",
    "motor.set_zoom",
    "motor.fit_to_view",
    "motor.set_mode",
    "motor.navigate",
    "motor.set_awakening",
    "motor.panel.update",
    "motor.notification",
    "topology.get",
    "proprioception.get",
    "provider.register_capability",
    "capabilities.sensory",
    "capabilities.sensory.negotiate",
]

[organism.ipc]
primary = "json-rpc"
secondary = "tarpc"
fallback = "http"
socket_pattern = "${XDG_RUNTIME_DIR}/biomeos/petaltongue.sock"

[organism.modes]
server = { description = "IPC server (germination mode)", subcommand = "server" }
ui = { description = "Desktop GUI (egui)", subcommand = "ui" }
tui = { description = "Terminal UI (ratatui)", subcommand = "tui" }
web = { description = "Web dashboard", subcommand = "web" }
headless = { description = "Headless mode (no GUI)", subcommand = "headless" }
live = { description = "Desktop GUI + IPC (NUCLEUS interactive)", subcommand = "live" }
status = { description = "Health and capability info", subcommand = "status" }

[organism.signals]
sigterm = "graceful_shutdown"
sigint = "graceful_shutdown"

[organism.exit_codes]
success = 0
general_error = 1
config_error = 2
network_error = 3

[organism.health]
liveness = "health.liveness"
readiness = "health.readiness"
check = "health.check"
heartbeat_interval_secs = 30

[ecobin]
pure_rust = true
unsafe_code = false
c_dependencies = []
cross_targets = [
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
]

[deploy]
graph = "graphs/petaltongue_deploy.toml"
dependencies = ["beardog", "songbird"]
optional_dependencies = ["toadstool"]
